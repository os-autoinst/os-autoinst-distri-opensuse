---
os_release:
  NAME: 'SLES'
  PRETTY_NAME: 'SUSE Linux Enterprise Server %VERSION%'
  VARIANT: 'Enterprise Server'
  VARIANT_ID: 'server'
  VERSION_ID: '%VERSION%'
  ID: 'sles'
  ID_LIKE: 'suse opensuse'
  CPE_NAME: 'cpe:/o:suse:sles:16:%VERSION%'
  SUSE_SUPPORT_PRODUCT: 'SUSE Linux Enterprise Server'
repos:
  - name: http://openqa.suse.de/assets/repo/SLES-%VERSION%-Full-%ARCH%-Build%BUILD%.install/install/
    uri: http://openqa.suse.de/assets/repo/SLES-%VERSION%-Full-%ARCH%-Build%BUILD%.install/install/
    enabled: 'Yes'
    filter: name
selinux:
  status: enabled
  mode: enforcing
crypttab:
  num_devices_encrypted: 2
<<: !include test_data/yast/encryption/default_enc_luks2.yaml
