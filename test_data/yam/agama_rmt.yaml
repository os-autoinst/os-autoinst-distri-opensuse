    enabled: 'Yes'
    filter: name
    URI: http://migration-rmt2.qe.nue2.suse.org/repo/SUSE/Products/SLE-Product-SLES/%VERSION%/%ARCH%/product/
  - name: SLE-Product-SLES-%VERSION%-Debug
    alias: SUSE_Linux_Enterprise_Server_%ARCH%:SLE-Product-SLES-%VERSION%-Debug
