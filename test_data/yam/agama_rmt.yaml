    enabled: 'No'
    filter: name
    URI: http://migration-rmt2.qe.nue2.suse.org/repo/SUSE/Products/SLE-Product-SLES/%VERSION%/%ARCH%/product_debug/
  - name: SLE-Product-SLES-%VERSION%-Source
    alias: SUSE_Linux_Enterprise_Server_%ARCH%:SLE-Product-SLES-%VERSION%-Source
    Autorefresh: 'On'
    enabled: 'No'
    filter: name
    URI: http://migration-rmt2.qe.nue2.suse.org/repo/SUSE/Products/SLE-Product-SLES/%VERSION%/%ARCH%/product_source/
  - name: NVIDIA-GPU-Compute-Toolkit-CUDA-16
    alias: SUSE_Linux_Enterprise_Server_%ARCH%:NVIDIA-GPU-Compute-Toolkit-CUDA-16
    uri: https://migration-rmt2.qe.nue2.suse.org/repo/compute/cuda/repos/suse16/%ARCH%/
