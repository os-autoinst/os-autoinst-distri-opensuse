name: agama_install_ltp_pvm
description:    >
    Install system and LTP using the Agama installer on PowerVM.
vars:
    INST_AUTO: kernel/agama_auto/sle16.jsonnet
schedule:
    - installation/ipxe_install
    - installation/agama_reboot
    - installation/first_boot
    - console/system_prepare
    - kernel/install_ltp
    - kernel/shutdown_ltp
