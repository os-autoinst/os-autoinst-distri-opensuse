name:           blktests
description:    >
    Executing blktests, the upstream testsuite
vars:
    DESKTOP: textmode
    VIDEOMODE: text
    VIRTIO_CONSOLE: 1
    QEMUCPUS: 4
    DUMP_MEMORY_ON_FAIL: 1
    BOOT_HDD_IMAGE: 1

conditional_schedule:
    kernel:
        KERNEL_FROM_GIT:
            1:
                - kernel/build_git_kernel
schedule:
    - boot/boot_to_desktop
    - '{{kernel}}'
    - kernel/blktests
