name: autoyast_minimal_no_updates
description:    >
  Test performs an autoyast installation and publishes a qcow image of a minimal SLES
  installation with registration enabled and updates (including self updates) disabled.
schedule:
  - autoyast/prepare_profile
  - installation/bootloader_start
  - autoyast/installation
  - installation/first_boot
  - console/system_prepare
  - console/hostname
  - console/force_scheduled_tasks
  - shutdown/grub_set_bootargs
  - shutdown/cleanup_before_shutdown
  - shutdown/shutdown
  - '{{svirt_upload_assets}}'
conditional_schedule:
  svirt_upload_assets:
    ARCH:
      s390x:
        - shutdown/svirt_upload_assets
