---
name: IPSec and L2TP 3 hosts VMs
description:    >
    Multimachine 3-hosts setup for ipsec and l2tp tests in VMs
vars:
  DESKTOP: textmode
  BOOT_HDD_IMAGE: 1
test_data:
  <<: !include test_data/kernel/multimachine/ipsec_3hosts.yaml
conditional_schedule:
  bootmenu:
    ARCH:
      aarch64:
schedule:
  - '{{bootmenu}}'
  - boot/boot_to_desktop
  - ipsec/ipsec3hosts
  - ipsec/l2tp3hosts
