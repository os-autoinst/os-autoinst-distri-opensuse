name: shellcheck
on:
  push:
    paths:
      - 'data/publiccloud/**'
  pull_request:
    paths:
      - 'data/publiccloud/**'
permissions: {}
jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: './data/publiccloud' 
