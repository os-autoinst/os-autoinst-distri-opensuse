routes:
  config:
    - destination: 0.0.0.0/0
      metric: 100
      next-hop-address: 192.168.122.1
      next-hop-interface: enp1s0
      table-id: 254
    - destination: 192.168.122.0/24
      metric: 100
      next-hop-address:
      next-hop-interface: enp1s0
      table-id: 254
dns-resolver:
  config:
    server:
      - 192.168.122.1
      - 8.8.8.8
interfaces:
  - name: enp1s0
    type: ethernet
    state: up
    mac-address: 52:54:00:be:a9:b5
    ipv4:
      address:
        - ip: 192.168.122.11
          prefix-length: 24
      enabled: true
    ipv6:
      enabled: false
