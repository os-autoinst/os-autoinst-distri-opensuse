version: 1.6.0
variant: fcos
passwd:
  # Create secondary group for 'qetest' user
  groups:
    - name: qetestgroup
  # Create 'root' and 'qetest' users
  users:
    - name: qetest
      password_hash: "%TEST_PASSWORD%"
      groups:
        - qetestgroup
    - name: root
      password_hash: "%TEST_PASSWORD%"
      ssh_authorized_keys:
        - ssh-rsa  UnifiedCore
storage:
  # Workaround to be able to create a regular user at first boot with Butane
  filesystems:
    - device: /dev/disk/by-label/SYSTEM
      format: btrfs
      mount_options:
        - subvol=/@/home
      path: /home
  files:
    - path: /etc/hosts
      overwrite: false
      append:
        - inline: |
            # BEGIN_STATIC_HOSTS
%STATIC_HOSTS%
            # END_STATIC_HOSTS
    - path: /etc/ssh/sshd_config.d/root_access.conf
      overwrite: true
      mode: 0600
      contents:
        inline: PermitRootLogin yes
    - path: /root/.profile
      overwrite: true
      mode: 0640
      contents:
          inline: |
            export KUBECONFIG=/etc/rancher/%K8S%/%K8S%.yaml
            export PATH=${PATH}:/var/lib/rancher/%K8S%/bin
    - path: /root/.ssh/config
      overwrite: true
      mode: 0600
      contents:
        inline: |
          UserKnownHostsFile /dev/null
          CheckHostIP no
          StrictHostKeyChecking no
systemd:
  units:
    - name: sshd.service
      enabled: true
    - name: k8s-preinstall.service
      enabled: true
      contents: |
        [Unit]
        Description=K8s Pre-Installation
        ConditionFirstBoot=true
        Requires=network-online.target
        Before=k8s-config-installer.service

        [Service]
        Type=oneshot
        Restart=on-failure
        ExecStart=/bin/sh -c "mkdir -p /etc/rancher/rke2"
        ExecStart=/bin/sh -c "echo \"node-external-ip: $(ip -o route get 1 | cut -d' ' -f7)\" > /etc/rancher/rke2/config.yaml"
        ExecStartPost=/bin/sh -c "systemctl disable k8s-preinstall.service"
        ExecStartPost=/bin/sh -c "rm -rf /etc/systemd/system/k8s-preinstall.service"

        [Install]
        WantedBy=multi-user.target
