# ========================================================
# RSYSLOG TLS CLIENT CONFIGURATION
# Location: /etc/rsyslog.d/10-tls-client.conf
# ========================================================

# 1. Global OpenSSL Driver Configuration
# Client only needs the CA certificate to verify the Server's identity
global(
  DefaultNetstreamDriver="ossl"
  DefaultNetstreamDriverCAFile="/etc/rsyslog-certs/ca.pem"
)

# 2. Forwarding Queue (Prevents log loss if the Server goes offline)
# If the network drops, rsyslog will buffer logs to disk until connection returns
main_queue(
  queue.size="100000"
  queue.type="LinkedList"
  queue.filename="forward_tls_queue"
  queue.highwatermark="50000"
  queue.lowwatermark="10000"
  queue.saveonshutdown="on"
)

# 3. Secure Outbound Routing Rule
# CHANGE "YOUR_SERVER_IP_OR_FQDN" to your actual server's network address
*.* action(
  type="omfwd"
  target="server"
  protocol="tcp"
  port="6514"
  StreamDriver="ossl"
  StreamDriverMode="1"         # Force TLS encryption
  StreamDriverAuthMode="anon"   # Server identity verification
)
