# ========================================================
# RSYSLOG TLS SERVER CONFIGURATION
# Location: /etc/rsyslog.d/10-tls-server.conf
# ========================================================

# 1. Global OpenSSL Driver Configuration
global(
  DefaultNetstreamDriver="ossl"
  DefaultNetstreamDriverCAFile="/etc/rsyslog-certs/ca.pem"
  DefaultNetstreamDriverCertFile="/etc/rsyslog-certs/server-cert.pem"
  DefaultNetstreamDriverKeyFile="/etc/rsyslog-certs/server-key.pem"
)

# 2. Load the TCP Inbound Module with OpenSSL
module(load="imtcp"
  StreamDriver.Name="ossl"
  StreamDriver.Mode="1"       # Force TLS encryption
  StreamDriver.AuthMode="anon" # Anonymous clients allowed (Server validates itself)
)

# 3. Dynamic Directory Template
# This automatically organizes incoming logs into /var/log/remote/HOSTNAME/syslog.log
template(name="RemoteClientLogs" type="string" string="/var/log/remote/%HOSTNAME%/syslog.log")

# 4. Ruleset to Handle Ingested Logs
ruleset(name="storeRemoteLogs") {
    action(type="omfile" dynaFile="RemoteClientLogs")
    stop # Prevents remote logs from spilling into the Server's local /var/log/syslog
}

# 5. Bind the TCP Input Port to the Ruleset
input(type="imtcp" port="6514" ruleset="storeRemoteLogs")
